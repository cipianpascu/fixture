version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: backend-gateway-db
    environment:
      POSTGRES_DB: backend_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-gateway-routing:
    build: .
    container_name: backend-gateway-routing
    environment:
      SPRING_PROFILES_ACTIVE: routing
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend-gateway-fixture:
    build: .
    container_name: backend-gateway-fixture
    environment:
      SPRING_PROFILES_ACTIVE: fixture
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/backend_gateway
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
